syntax = "proto3";

package role;

option go_package = "github.com/sologenic/com-fs-utils-lib/models/role;role";

enum Role {
  option allow_alias = true;

  NOT_USED_ROLE = 0;

  // End-user role
  NORMAL_USER = 1;

  // Broker & asset management roles for an organization
  BROKER_ASSET_ADMINISTRATOR = 3;

  ORGANIZATION_ADMINISTRATOR = 4;

  // Same as TX_SYSTEM_MANAGER but limited to organization admin belongs to
  ORGANIZATION_SYSTEM_MANAGER = 22;

  // TX staff roles

  // Highest level of access including access to secrets and important settings
  TX_SYSTEM_MANAGER = 21;

  // Highest level of access excluding access to secrets and important settings
  TX_ADMINISTRATOR = 6;

  // Manages everything related to partners
  // TODO: Rename to TX_PARTNERS_MANAGER
  TX_ACCOUNT_MANAGER = 8;

  // Manages marketing aspects
  TX_MARKETING_MANAGER = 20;

  // Manages user information, KYC stuff

  // Deprecated: please use instead TX_KYC_MANAGER
  KYC_ADMINISTRATOR = 7;
  TX_KYC_MANAGER = 7;

  // Partner scope hierarchy for broker

  // TODO: Rename (get rid of "admin" and replace with "manager")
  PARTNER_BROKER_ADMIN = 10;

  // Day-to-day operations
  // TODO: Rename and think if it can be merged with PARTNER_BROKER_ADMIN
  PARTNER_BROKER_ACCOUNT_MANAGER = 11;

  // Partner scope hierarchy for sales channel

  // TODO: Rename (get rid of "admin" and replace with "manager")
  PARTNER_SALES_ADMIN = 12;

  // Day-to-day operations
  // TODO: Rename and think if it can be merged with PARTNER_SALES_ADMIN
  PARTNER_SALES_ACCOUNT_MANAGER = 13;

}
