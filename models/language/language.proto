syntax = "proto3";

package language;

option go_package = "github.com/sologenic/com-fs-utils-lib/models/language;language";

import "buf/validate/validate.proto";

enum Lang {
    LANG_NOT_USED = 0;
    ENGLISH = 1;
    SPANISH = 2;
    KOREAN = 3;
}

message Language {
    Lang Language = 1 [
      (buf.validate.field).enum.defined_only = true
    ];
    bool UserConfigured = 2;
}
